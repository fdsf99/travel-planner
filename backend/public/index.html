<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能旅游规划助手</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="logo">🌍 智能旅游规划助手</a>
      <nav class="nav">
        <a href="/">首页</a>
        <a href="/my.html">我的行程</a>
        <a href="/login.html" id="navAdmin">管理后台</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>用 AI 为你定制专属行程</h1>
      <p class="subtitle">输入目的地与偏好，一键生成多日旅游规划</p>
    </section>

    <section class="card form-card">
      <h2>生成新行程</h2>
      <form id="planForm">
        <div class="form-row">
          <label>
            <span>目的地 *</span>
            <input type="text" id="destination" placeholder="如：北京" required>
          </label>
          <label>
            <span>出发日期 *</span>
            <input type="date" id="startDate" required>
          </label>
        </div>
        <div class="form-row">
          <label>
            <span>天数</span>
            <input type="number" id="days" value="3" min="1" max="15">
          </label>
          <label>
            <span>预算(元)</span>
            <input type="number" id="budget" value="5000" min="0">
          </label>
        </div>
        <div class="form-group">
          <span>兴趣偏好</span>
          <div class="tags" id="interestTags"></div>
        </div>
        <button type="submit" id="submitBtn" class="btn-primary">✨ 生成行程</button>
      </form>
      <div id="statusMsg" class="status-msg"></div>
    </section>

    <section class="card recent-card" id="recentSection" style="display:none;">
      <h2>最近行程</h2>
      <ul id="recentList" class="recent-list"></ul>
    </section>
  </main>

  <footer class="footer">
    <div class="container">智能旅游规划助手 · AI 驱动</div>
  </footer>

  <script src="/config.js"></script>
  <script src="/app.js"></script>
</body>
</html>
